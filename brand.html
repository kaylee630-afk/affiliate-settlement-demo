<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PayFlash · Send</title>
<link rel="icon" type="image/png" sizes="64x64" href="/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="manifest" href="/manifest.json"><script src="/sw-register.js"></script>
<style>
:root{--bg:#010314;--text:#f5f5f7;--text2:#8b8fa3;--accent:#6366f1;--green:#22c55e;--red:#ef4444;--gold:#f5a623;--orange:#f59e0b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
#stars{position:fixed;inset:0;z-index:0;pointer-events:none}
.content{position:relative;z-index:1}
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 32px;background:rgba(1,3,20,.85);backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,.06)}
.nav-logo{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:800;color:#fff;text-decoration:none}.nav-logo img{width:28px;height:28px;border-radius:7px}
.nav-links{display:flex;gap:28px}.nav-links a{color:rgba(255,255,255,.7);text-decoration:none;font-size:13px;font-weight:500;transition:color .2s}.nav-links a:hover,.nav-links a.active{color:#fff}
.nav-cta{padding:9px 22px;border-radius:999px;background:var(--accent);color:#fff;font-size:13px;font-weight:600;text-decoration:none;transition:all .3s;box-shadow:0 0 16px rgba(99,102,241,.25)}.nav-cta:hover{transform:translateY(-1px)}

.main{max-width:720px;margin:0 auto;padding:40px 32px 80px}

/* Steps */
.step-bar{display:flex;align-items:center;gap:0;margin-bottom:28px}
.step-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;background:rgba(255,255,255,.06);color:var(--text2);flex-shrink:0;transition:all .4s}
.step-dot.active,.step-dot.done{background:var(--accent);color:#fff}.step-dot.done::after{content:' ✓';font-size:10px}
.step-label{font-size:12px;color:var(--text2);margin-left:8px;font-weight:500;transition:color .3s}.step-label.active{color:var(--text)}.step-label.done{color:var(--text)}
.step-line{flex:1;height:1px;background:rgba(255,255,255,.08);margin:0 12px;transition:all .3s}.step-line.active{background:var(--accent)}

/* Jelly */
.jelly{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:24px;margin-bottom:14px;backdrop-filter:blur(40px) saturate(1.5);-webkit-backdrop-filter:blur(40px) saturate(1.5);box-shadow:inset 0 1px 0 rgba(255,255,255,.04),0 2px 12px rgba(0,0,0,.2);position:relative;overflow:hidden;will-change:transform;transition:border-color .5s,box-shadow .5s}
.jelly::before{content:'';position:absolute;inset:0;border-radius:inherit;background:radial-gradient(ellipse at var(--mx,50%) var(--my,50%),rgba(99,102,241,.2)0%,rgba(99,102,241,.08)30%,transparent 60%);opacity:0;transition:opacity .5s;pointer-events:none;z-index:0}
.jelly:hover::before,.jelly.active::before{opacity:1}
.jelly::after{content:'';position:absolute;top:0;left:12%;right:12%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);opacity:0;transition:opacity .4s;pointer-events:none;z-index:1}
.jelly:hover::after,.jelly.active::after{opacity:1}
.jelly .spec{position:absolute;border-radius:50%;pointer-events:none;z-index:2;background:radial-gradient(circle,rgba(255,255,255,.05)0%,transparent 60%);width:80px;height:80px;left:var(--sx,50%);top:var(--sy,50%);transform:translate(-50%,-50%);opacity:0;transition:opacity .3s}
.jelly:hover .spec,.jelly.active .spec{opacity:1}
.jelly .inner{position:relative;z-index:3}
.jelly h3{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px}

/* Contacts + search */
.contact-search{margin-bottom:12px}.contact-search input{width:100%;padding:12px 16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;color:var(--text);font-family:'Inter',sans-serif;outline:none;font-size:14px}.contact-search input:focus{border-color:var(--accent)}.contact-search input::placeholder{color:var(--text2)}
.favorites{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}.fav{display:flex;align-items:center;gap:6px;padding:6px 14px 6px 6px;border-radius:20px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);cursor:pointer;transition:all .2s;font-size:12px}.fav:hover{border-color:var(--accent);background:rgba(99,102,241,.08)}.fav .mini-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700}
.contact{display:flex;align-items:center;gap:12px;padding:14px;border-radius:14px;cursor:pointer;transition:all .2s;background:rgba(255,255,255,.02);border:1px solid transparent;margin-bottom:4px}
.contact:hover,.contact.sel{border-color:var(--accent);background:rgba(99,102,241,.06)}
.contact-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:19px;flex-shrink:0;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.contact-info{flex:1}.contact-info .name{font-size:16px;font-weight:600}.contact-info .sub{font-size:12px;color:var(--text2)}
.contact-check{width:24px;height:24px;border-radius:50%;border:2px solid rgba(255,255,255,.12);flex-shrink:0;transition:all .3s}.contact.sel .contact-check{background:var(--accent);border-color:var(--accent)}

/* Amount with keypad */
.amt-row{display:flex;align-items:center;justify-content:center;gap:4px;padding:12px 0}.amt-row .dollar{font-size:44px;font-weight:200;color:var(--text2)}.amt-row input{width:55%;background:none;border:none;font-size:48px;font-weight:700;color:var(--text);text-align:center;font-family:'Inter',sans-serif;outline:none;caret-color:var(--accent)}.amt-row input::placeholder{color:rgba(255,255,255,.1)}
.quick-amt{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}.q-btn{padding:8px 18px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid rgba(255,255,255,.08);background:transparent;color:var(--text2);font-family:'Inter',sans-serif;transition:all .2s}.q-btn:hover,.q-btn.sel{border-color:var(--accent);background:rgba(99,102,241,.1);color:var(--text)}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:300px;margin:0 auto}.kp-btn{height:48px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:var(--text);font-family:'Inter',sans-serif;font-size:18px;font-weight:500;cursor:pointer;transition:all .15s}.kp-btn:hover{background:rgba(99,102,241,.1);border-color:var(--accent)}.kp-btn:active{transform:scale(.94)}.kp-btn.del{color:var(--red)}.kp-btn.clr{color:var(--text2);font-size:13px}

/* Options */
.option-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}.opt-btn{display:flex;align-items:center;gap:6px;padding:10px 14px;border-radius:10px;font-size:12px;color:var(--text2);cursor:pointer;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);font-family:'Inter',sans-serif;transition:all .2s}.opt-btn:hover,.opt-btn.sel{border-color:var(--accent);background:rgba(99,102,241,.08);color:var(--text)}
.memo-input{flex:1;min-width:180px;padding:10px 14px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:10px;color:var(--text);font-family:'Inter',sans-serif;outline:none;font-size:13px}.memo-input:focus{border-color:var(--accent)}.memo-input::placeholder{color:var(--text2)}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:rgba(255,255,255,.02);border-radius:10px;margin-top:8px;cursor:pointer;transition:all .2s}.toggle-row:hover{background:rgba(99,102,241,.04)}.toggle{width:44px;height:24px;border-radius:12px;background:rgba(255,255,255,.1);position:relative;transition:all .3s}.toggle.on{background:var(--accent)}.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:all .3s}.toggle.on::after{left:22px}

/* Commission */
.expandable{overflow:hidden;transition:max-height .4s cubic-bezier(.22,1,.36,1),opacity .3s;max-height:0;opacity:0}.expandable.open{max-height:200px;opacity:1}
.comm-row{display:flex;gap:6px;margin-top:12px}.comm-btn{flex:1;padding:12px 8px;border-radius:12px;font-size:13px;font-weight:500;cursor:pointer;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);color:var(--text2);font-family:'Inter',sans-serif;text-align:center;transition:all .2s}.comm-btn:hover,.comm-btn.sel{border-color:var(--accent);background:rgba(99,102,241,.12);color:var(--text)}.comm-btn .pct{font-size:20px;font-weight:700;display:block}.comm-btn .tag{font-size:10px;opacity:.6}

/* Receipt */
.receipt{background:rgba(255,255,255,.02);border-radius:12px;padding:16px}.receipt-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;color:var(--text2)}.receipt-row .val{color:var(--text);font-weight:500}

/* Total */
.total-box{text-align:center;padding:20px;background:rgba(34,197,94,.04);border-radius:14px;border:1px solid rgba(34,197,94,.1);margin:12px 0}.total-box .amt{font-size:38px;font-weight:800;color:var(--green)}.total-box .sub{font-size:11px;color:var(--text2);margin-top:3px}

/* Risk */
.risk{display:flex;align-items:center;gap:8px;padding:12px 16px;border-radius:12px;margin:12px 0;font-size:12px}
.risk.safe{background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.12);color:var(--green)}
.risk.warn{background:rgba(245,166,35,.06);border:1px solid rgba(245,166,35,.12);color:var(--gold)}

/* Buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:15px 28px;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all .3s}
.btn-primary{background:var(--accent);color:#fff;flex:1;box-shadow:0 0 20px rgba(99,102,241,.2)}.btn-primary:hover{filter:brightness(1.1);box-shadow:0 4px 28px rgba(99,102,241,.4)}.btn-primary:disabled{opacity:.25;pointer-events:none}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid rgba(255,255,255,.1);flex:.4}.btn-row{display:flex;gap:10px}

/* History */
.tx-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)}.tx-item:last-child{border-bottom:none}
.tx-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;flex-shrink:0}
.tx-info{flex:1}.tx-info .name{font-size:13px;font-weight:600}.tx-info .time{font-size:10px;color:var(--text2)}.tx-amount{font-size:14px;font-weight:700;color:var(--green)}

.success{text-align:center;padding:40px 0}.success .circle{width:80px;height:80px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:36px;animation:pop .5s cubic-bezier(.22,1,.36,1)}@keyframes pop{0%{transform:scale(0)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
.success h2{font-size:28px;font-weight:700;margin-bottom:4px}.success p{color:var(--text2);font-size:15px}

footer{text-align:center;padding:24px;color:var(--text2);font-size:11px;border-top:1px solid rgba(255,255,255,.04)}footer a{color:var(--accent);text-decoration:none}
@media(max-width:600px){nav{padding:12px 20px}.nav-links{display:none}.main{padding:24px 16px 60px}.keypad{max-width:100%}}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="content">
<nav><a href="/" class="nav-logo"><img src="/favicon.png">PayFlash</a><div class="nav-links"><a href="/">Home</a><a href="/brand" class="active">Send</a><a href="/affiliate">Affiliate</a></div><a href="/brand" class="nav-cta">Launch App</a></nav>

<div class="main">
  <div class="step-bar" id="stepBar">
    <div class="step-dot active" id="d1">1</div><span class="step-label active" id="l1">Select</span>
    <div class="step-line" id="line1"></div>
    <div class="step-dot" id="d2">2</div><span class="step-label" id="l2">Amount</span>
    <div class="step-line" id="line2"></div>
    <div class="step-dot" id="d3">3</div><span class="step-label" id="l3">Confirm</span>
  </div>
  <div id="view"></div>
  <div style="margin-top:40px" id="historySection"></div>
</div>
<footer><p>PayFlash · Base L2 · USDC · 2026</p><p style="margin-top:2px"><a href="/">Home</a> · <a href="/affiliate">Affiliate View →</a></p></footer>
</div>

<script>
let step=1,amount=0,rate=5,selA={id:'@alice_cn',name:'Alice Chen',avatar:'A'};
let scheduled=false,scheduleDate='',commissionMode=false;
const contacts=[{id:'@alice_cn',name:'Alice Chen',flag:'🇭🇰',cat:'Beauty',color:'#6366f1',letter:'A',fav:true},{id:'@bob_kr',name:'Bob Park',flag:'🇰🇷',cat:'Tech',color:'#8b5cf6',letter:'B',fav:true},{id:'@carol_jp',name:'Carol Tanaka',flag:'🇯🇵',cat:'Fashion',color:'#a855f7',letter:'C'},{id:'@dave_br',name:'Dave Silva',flag:'🇧🇷',cat:'Outdoor',color:'#22c55e',letter:'D'},{id:'@eve_de',name:'Eve Mueller',flag:'🇩🇪',cat:'Home',color:'#f59e0b',letter:'E'}];
const chains=[{id:'base',name:'Base',icon:'🔵',gas:'<$0.01',time:'~2s'},{id:'poly',name:'Polygon',icon:'🟣',gas:'<$0.01',time:'~2s'},{id:'arb',name:'Arbitrum',icon:'🟠',gas:'<$0.01',time:'~1s'},{id:'op',name:'Optimism',icon:'🔴',gas:'<$0.01',time:'~1s'}];
let selectedChain='base';

const SK='lightning_commission_demo';
function dfl(){return {balance:5000,txs:[]}}
function ld(){const r=localStorage.getItem(SK);return r?JSON.parse(r):dfl()}
function sd(d){localStorage.setItem(SK,JSON.stringify(d));if(typeof BroadcastChannel!='undefined')new BroadcastChannel('lightning_commission').postMessage({type:'dc',txCount:d.txs.length})}

function setStep(s){
  step=s;for(let i=1;i<=3;i++){const d=document.getElementById('d'+i),l=document.getElementById('l'+i);d.classList.remove('active','done');l.classList.remove('active');if(i<s){d.classList.add('done');l.classList.add('active')}if(i===s){d.classList.add('active');l.classList.add('active')}}
  document.getElementById('line1').classList.toggle('active',s>=2);document.getElementById('line2').classList.toggle('active',s>=3);
  render()
}

function render(){
  const v=document.getElementById('view');
  if(step===1)v.innerHTML=`<div class="jelly"><div class="spec"></div><div class="inner"><h3>Who are you paying?</h3>
    <div class="contact-search"><input type="text" placeholder="🔍 Search contacts..." oninput="filterContacts(this.value)"></div>
    <div class="favorites">${contacts.filter(c=>c.fav).map(c=>`<div class="fav" onclick="sel('${c.id}')"><div class="mini-avatar" style="background:linear-gradient(135deg,${c.color},#3b82f6)">${c.letter}</div>${c.name} ⭐</div>`).join('')}</div>
    <div id="contactList">${contacts.map(p=>`<div class="contact ${selA.id===p.id?'sel':''}" onclick="sel('${p.id}')"><div class="contact-avatar" style="background:linear-gradient(135deg,${p.color},#3b82f6)">${p.letter}</div><div class="contact-info"><div class="name">${p.name}</div><div class="sub">${p.flag} ${p.cat}</div></div><div class="contact-check"></div></div>`).join('')}</div></div></div>`;
  else if(step===2)v.innerHTML=`<div class="jelly"><div class="spec"></div><div class="inner"><h3>How much?</h3>
    <div class="amt-row"><span class="dollar">$</span><input type="text" id="amtInput" value="${amount||''}" placeholder="0.00" inputmode="none" onfocus="this.blur()"></div>
    <div class="quick-amt">${[50,100,200,500,1000].map(a=>`<button class="q-btn${amount===a?' sel':''}" onclick="setAmt(${a})">$${a}</button>`).join('')}</div>
    <div class="keypad">${[['1','2','3'],['4','5','6'],['7','8','9'],['C','0','⌫']].map(row=>row.map(k=>`<button class="kp-btn${k==='⌫'?' del':k==='C'?' clr':''}" onclick="kp('${k}')">${k}</button>`).join('')).join('')}</div></div></div>
  <div class="jelly"><div class="spec"></div><div class="inner"><h3>Details</h3>
    <div class="option-row"><input class="memo-input" placeholder="📝 Add a note..." id="memo">
    ${chains.map(ch=>`<button class="opt-btn${selectedChain===ch.id?' sel':''}" onclick="pickChain('${ch.id}')">${ch.icon} ${ch.name}</button>`).join('')}</div>
    <div class="toggle-row" onclick="commissionMode=!commissionMode;render()"><span style="font-size:13px">📊 Commission Settlement</span><div class="toggle${commissionMode?' on':''}"></div></div>
    <div class="expandable${commissionMode?' will-open':''}"><div class="comm-row">${[5,10,15].map(r=>`<button class="comm-btn${rate===r?' sel':''}" onclick="setRate(${r})"><span class="pct">${r}%</span><span class="tag">${r===5?'Standard':r===10?'Premium':'VIP'}</span></button>`).join('')}</div></div>
    <div class="toggle-row" onclick="scheduled=!scheduled;render()"><span style="font-size:13px">⏰ Schedule for later</span><div class="toggle${scheduled?' on':''}"></div></div>
    <div class="expandable${scheduled?' will-open':''}" style="margin-top:8px"><input type="datetime-local" class="memo-input" value="${scheduleDate||new Date(Date.now()+86400000).toISOString().slice(0,16)}" onchange="scheduleDate=this.value" style="width:100%"></div>
    <div style="display:flex;gap:6px;margin-top:8px;font-size:11px;color:var(--text2)">⛽ Gas: ${chains.find(c=>c.id===selectedChain)?.gas||'<$0.01'} · ⏱ ${chains.find(c=>c.id===selectedChain)?.time||'~2s'}</div></div></div>
  <button class="btn btn-primary" onclick="${commissionMode?'setStep(3)':'doSend()'}" ${amount<=0?'disabled':''}>${commissionMode?'Next →':'⚡ Send Now'}</button>`;
  else if(step===3){const comm=amount*rate/100;
    v.innerHTML=`<div class="jelly"><div class="spec"></div><div class="inner"><h3>Confirm Payment</h3>
    ${selA.name?`<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px"><div class="contact-avatar" style="width:40px;height:40px;font-size:15px;background:linear-gradient(135deg,${contacts.find(p=>p.id===selA.id)?.color||'#6366f1'},#3b82f6)">${selA.avatar}</div><div><div style="font-weight:600">${selA.name}</div><div style="font-size:11px;color:var(--text2)">${contacts.find(p=>p.id===selA.id)?.flag||''} ${contacts.find(p=>p.id===selA.id)?.cat||''}</div></div></div>`:''}
    <div class="receipt"><div class="receipt-row"><span>Amount</span><span class="val">$${amount.toFixed(2)}</span></div>
    ${commissionMode?`<div class="receipt-row"><span>Rate</span><span class="val">${rate}%</span></div><div class="receipt-row"><span>Commission</span><span class="val" style="color:var(--green)">$${comm.toFixed(2)}</span></div>`:''}
    <div class="receipt-row"><span>Chain</span><span class="val">${chains.find(c=>c.id===selectedChain)?.icon||'🔵'} ${chains.find(c=>c.id===selectedChain)?.name||'Base'}</span></div>
    <div class="receipt-row"><span>Gas Fee</span><span class="val">~$0.003</span></div>
    <div class="receipt-row"><span>Est. Arrival</span><span class="val">${chains.find(c=>c.id===selectedChain)?.time||'~2s'}</span></div>
    ${scheduled?`<div class="receipt-row"><span>Scheduled</span><span class="val" style="color:var(--orange)">${scheduleDate||'Tomorrow'}</span></div>`:''}
    </div>
    <div class="total-box"><div class="amt">$${commissionMode?comm.toFixed(2):amount.toFixed(2)}</div><div class="sub">USDC · ${chains.find(c=>c.id===selectedChain)?.name||'Base'} L2</div></div>
    <div class="risk safe"><span>🛡️</span><b>Score ${Math.floor(Math.random()*8+1)}</b> · Safe — No risk flags</div>
    <div class="btn-row"><button class="btn btn-ghost" onclick="setStep(2)">← Back</button><button class="btn btn-primary" onclick="doSend()">⚡ Confirm & Send</button></div></div></div>`}
  else v.innerHTML=`<div class="jelly"><div class="spec"></div><div class="inner"><div class="success"><div class="circle">✓</div><h2>Sent!</h2><p>$${commissionMode?(amount*rate/100).toFixed(2):amount.toFixed(2)} USDC → ${selA.name}</p><p style="font-size:12px;color:var(--text2);margin-top:4px">${scheduled?'Scheduled for '+scheduleDate:'Arrived on '+chains.find(c=>c.id===selectedChannel)?.name||'Base L2'}</p><button class="btn btn-primary" style="margin-top:16px" onclick="amount=0;commissionMode=false;scheduled=false;setStep(1)">Send Another</button></div></div></div>`;
  initJelly();renderHistory();
  // 平滑展开动画
  requestAnimationFrame(()=>{
    document.querySelectorAll('.expandable.will-open').forEach(el=>{
      el.classList.remove('will-open');
      requestAnimationFrame(()=>el.classList.add('open'));
    });
  });
}

function filterContacts(q){document.querySelectorAll('.contact').forEach(el=>{const n=el.querySelector('.name').textContent.toLowerCase();el.style.display=n.includes(q.toLowerCase())?'flex':'none'})}
function sel(id){selA=contacts.find(p=>p.id===id);setStep(2)}
function kp(k){const inp=document.getElementById('amtInput');if(!inp)return;let v=inp.value;if(k==='⌫'){v=v.slice(0,-1)}else if(k==='C'){v=''}else{v+=k;if(v.length>9)return}inp.value=v;amount=parseFloat(v)||0;document.querySelectorAll('.q-btn').forEach(b=>b.classList.remove('sel'))}
function setAmt(a){amount=a;const inp=document.getElementById('amtInput');if(inp)inp.value=a;document.querySelectorAll('.q-btn').forEach(b=>{if(parseInt(b.textContent.replace('$',''))===a)b.classList.add('sel');else b.classList.remove('sel')})}
function setRate(r){rate=r;render()}
function pickChain(id){selectedChain=id;render()}
function doSend(){
  const total=commissionMode?amount*rate/100:amount;const data=ld();data.txs.push({id:data.txs.length+1,affiliate:selA.id,name:selA.name,amount:total,time:'Just now',chain:selectedChain});sd(data);setStep(4)
}

function renderHistory(){
  const h=document.getElementById('historySection');const data=ld();if(!data.txs.length){h.innerHTML='';return}
  h.innerHTML=`<div class="jelly"><div class="spec"></div><div class="inner"><h3>Recent Activity</h3>`+data.txs.slice().reverse().slice(0,6).map(t=>`<div class="tx-item"><div class="tx-avatar" style="background:linear-gradient(135deg,#6366f1,#3b82f6)">${t.affiliate?t.affiliate.slice(1,2).toUpperCase():'?'}</div><div class="tx-info"><div class="name">${t.name||'Unknown'}</div><div class="time">${t.time} · $${(t.amount||0).toFixed(2)}</div></div><div class="tx-amount">$${(t.amount||0).toFixed(2)}</div></div>`).join('')+`</div></div>`
}

function initJelly(){
  document.querySelectorAll('.jelly').forEach(el=>{if(!el.dataset.inited){el.dataset.inited=1;el.insertAdjacentHTML('afterbegin','<span class="spec"></span>');const c={el,jelly:0,vel:0,sx:50,sy:50,svx:0,svy:0,hover:0,htarget:0};el.addEventListener('mouseenter',()=>c.htarget=1);el.addEventListener('mouseleave',()=>c.htarget=0);cards.push(c)}})
}
const cards=[],ms={x:innerWidth/2,y:innerHeight/2,tx:innerWidth/2,ty:innerHeight/2,vx:0,vy:0};
window.addEventListener('mousemove',e=>{ms.tx=e.clientX;ms.ty=e.clientY});
(function loop(ts){requestAnimationFrame(loop);const dt=Math.min((ts-(loop._lt||ts))/1000,.1);loop._lt=ts;ms.vx+=(ms.tx-ms.x)*10*dt;ms.vy+=(ms.ty-ms.y)*10*dt;ms.vx*=.8;ms.vy*=.8;ms.x+=ms.vx*dt*3;ms.y+=ms.vy*dt*3;
cards.forEach(c=>{const r=c.el.getBoundingClientRect();const cx=r.left+r.width/2,cy=r.top+r.height/2;const dx=ms.x-cx,dy=ms.y-cy,dist=Math.sqrt(dx*dx+dy*dy);const influence=Math.max(0,1-dist/(Math.max(r.width,r.height)*1.4));c.vel+=(influence-c.jelly)*10*dt;c.vel*=.55;c.jelly+=c.vel*dt;const j=c.jelly;const mxPct=((ms.x-r.left)/r.width*100);const myPct=((ms.y-r.top)/r.height*100);c.el.style.setProperty('--mx',mxPct+'%');c.el.style.setProperty('--my',myPct+'%');c.svx+=(mxPct-c.sx)*8*dt;c.svx*=.7;c.sx+=c.svx*dt;c.svy+=(myPct-c.sy)*8*dt;c.svy*=.7;c.sy+=c.svy*dt;c.el.style.setProperty('--sx',c.sx+'%');c.el.style.setProperty('--sy',c.sy+'%');c.hover+=(c.htarget-c.hover)*6*dt;const lift=-c.hover*6;const sx_=1+j*.04,sy_=1-j*.03,sk=j*.015,yOff=lift-j*5;c.el.style.transform=`translateY(${yOff}px) scaleX(${sx_}) scaleY(${sy_}) skewX(${sk}deg)`;c.el.style.borderColor=j>.08?`rgba(99,102,241,${.12+j*.3})`:'rgba(255,255,255,.08)';c.el.style.boxShadow=j>.08?`inset 0 1px 0 rgba(255,255,255,${.04+j*.08}),0 ${j*40}px ${j*80}px rgba(99,102,241,${.08+j*.2}),0 2px 12px rgba(0,0,0,.2)`:'inset 0 1px 0 rgba(255,255,255,.04),0 2px 12px rgba(0,0,0,.2)';c.el.classList.toggle('active',j>.05);})})(0);

const sc=document.getElementById('stars'),sx=sc.getContext('2d');sc.width=innerWidth;sc.height=innerHeight;
let stars=[];for(let i=0;i<200;i++)stars.push({x:Math.random()*2000,y:Math.random()*2000,r:.3+Math.random()*1.5,o:.2+Math.random()*.6,s:.1+Math.random()*.3});
(function loop2(){requestAnimationFrame(loop2);sx.fillStyle='#010314';sx.fillRect(0,0,sc.width,sc.height);stars.forEach(s=>{s.y-=s.s;if(s.y<0){s.y=sc.height;s.x=Math.random()*sc.width}sx.beginPath();sx.arc(s.x,s.y,s.r,0,Math.PI*2);sx.fillStyle=`rgba(255,255,255,${s.o})`;sx.fill()})})();
render();
</script>
</body>
</html>
